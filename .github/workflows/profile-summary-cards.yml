name: GitHub Profile Game Animate

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4 # Actualizado a v4 para soportar Node24
      - uses: yoshi389111/github-profile-3d-contrib@0.8.0 # Versión moderna compatible
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}
