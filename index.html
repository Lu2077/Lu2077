<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Mi Perfil</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #0d1117; color: #c9d1d9; }
        form { background-color: #161b22; padding: 25px; border-radius: 8px; border: 1px solid #30363d; width: 300px; display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-weight: bold; }
        input, textarea { background-color: #0d1117; border: 1px solid #30363d; color: white; padding: 8px; margin-bottom: 15px; border-radius: 6px; }
        button { background-color: #238636; color: white; border: none; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #2ea44f; }
    </style>
</head>
<body>

<form action="https://formspree.io" method="POST">
  <label for="email">Tu Correo Electrónico:</label>
  <input type="email" name="email" id="email" required placeholder="nombre@ejemplo.com">
  
  <label for="message">Mensaje:</label>
  <textarea name="message" id="message" rows="5" required placeholder="Escribe tu mensaje aquí..."></textarea>
  
  <button type="submit">Enviar Mensaje</button>
</form>

</body>
</html>
